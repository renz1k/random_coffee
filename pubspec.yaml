name: random_coffee
description: "Тестовое RandomCoffee"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8
  retrofit: ^4.9.2
  dio: ^5.9.1
  json_annotation: ^4.11.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  get_it: ^9.2.1
  dartz: 0.10.1
  scrollable_positioned_list: ^0.3.8
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.3
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  retrofit_generator: ^10.2.3
  json_serializable: ^6.13.0
  hive_ce_generator: ^1.11.1
  mockito: ^5.4.4



flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
    - lib/assets/icons/
    - .env
  
  fonts:
    - family: OpenSans
      fonts:
        - asset: lib/assets/fonts/OpenSans-Regular.ttf
          weight: 400
        - asset: lib/assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
          